<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Music Video Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- ZONE PRINCIPALE -->
        <main class="main-content">
            
            <!-- Section Vidéo -->
            <section class="video-container">
                <div class="video-wrapper">
                    <div id="youtube-iframe-player"></div>
                </div>
            </section>

            <!-- Section Playlist -->
            <section class="playlist-container">
                <div class="search-box">
                    <input type="text" id="search-bar" placeholder="Rechercher un titre...">
                </div>
                <div id="playlist-tracks" class="tracks-list">
                    <!-- Les titres seront injectés ici par JavaScript -->
                    <div class="loading">Chargement de la playlist...</div>
                </div>
            </section>

        </main>

        <!-- BARRE DE CONTRÔLE (BAS) -->
        <footer class="controls-bar">
            <!-- Infos morceau actuel -->
            <div class="now-playing">
                <img id="current-cover" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Pochette">
                <div class="track-info">
                    <div id="current-title" class="track-title">Aucun morceau en lecture</div>
                </div>
            </div>

            <!-- Boutons de contrôle & Progression -->
            <div class="player-core">
                <div class="buttons">
                    <button id="btn-shuffle" title="Lecture aléatoire">🔀</button>
                    <button id="btn-prev" title="Précédent">⏮</button>
                    <button id="btn-play-pause" class="play-btn" title="Lire / Pause">▶️</button>
                    <button id="btn-next" title="Suivant">⏭</button>
                    <button id="btn-repeat" title="Répéter">🔁</button>
                </div>
                <div class="progress-area">
                    <span id="time-current">0:00</span>
                    <input type="range" id="progress-bar" value="0" min="0" max="100">
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <!-- Volume -->
            <div class="volume-container">
                <span id="volume-icon">🔊</span>
                <input type="range" id="volume-slider" min="0" max="100" value="100">
            </div>
        </footer>
    </div>

    <!-- Chargement de l'IFrame Player API de YouTube -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
